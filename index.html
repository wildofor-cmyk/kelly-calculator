<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凯利公式与财富模拟器(完全体版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f9; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        .dashboard { display: table; width: 100%; margin-bottom: 25px; background: #f8fafc; border-radius: 8px; padding: 15px; border: 1px solid #e2e8f0; }
        .stat-box { display: table-cell; width: 33.33%; text-align: center; padding: 10px; }
        .stat-box:not(:last-child) { border-right: 1px solid #e2e8f0; }
        .stat-label { font-size: 14px; color: #64748b; margin-bottom: 5px; }
        .stat-value { font-size: 22px; font-weight: bold; color: #0f172a; }
        .stat-value.money { color: #10b981; }
        .main-layout { display: table; width: 100%; }
        .panel { display: table-cell; width: 50%; vertical-align: top; }
        .panel-left { padding-right: 15px; }
        .panel-right { padding-left: 15px; border-left: 1px solid #e2e8f0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #475569; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        .calc-hint { font-size: 12px; color: #2563eb; margin-top: 4px; font-weight: 500; }
        .btn-grid { margin-top: 20px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-win { background-color: #10b981; color: white; }
        .btn-win:hover { background-color: #059669; }
        .btn-lose { background-color: #ef4444; color: white; }
        .btn-lose:hover { background-color: #dc2626; }
        .btn-reset { background-color: #64748b; color: white; }
        .btn-reset:hover { background-color: #475569; }
        .history-title { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
        .history-container { max-height: 320px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: #475569; position: sticky; top: 0; }
        .text-win { color: #10b981; font-weight: bold; }
        .text-lose { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 凯利公式与财富模拟器 <small style="font-size:12px; color:#64748b;">(完全体·本地自动存档)</small></h1>
    
    <div class="dashboard">
        <div class="stat-box">
            <div class="stat-label">当前总资金</div>
            <div class="stat-value money" id="display-money">￥1,000.00</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">总投注次数</div>
            <div class="stat-value" id="display-count">0 次</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">实时综合胜率</div>
            <div class="stat-value" id="display-win-rate">0.0%</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="panel panel-left">
            <div class="input-group">
                <label for="input-money">我的金钱总数 (￥):</label>
                <input type="number" id="input-money" value="1000" min="0">
            </div>

            <div class="input-group">
                <label for="input-prob">预估本次事件胜率 (%):</label>
                <input type="number" id="input-prob" value="60" min="0" max="100">
            </div>

            <div class="input-group">
                <label for="input-odds">净赔率 / 盈亏比 (赢了赚几倍):</label>
                <input type="number" id="input-odds" value="1" min="0" step="0.1">
                <div class="calc-hint" id="kelly-hint">凯利建议下注比例: 20.00% (￥200.00)</div>
            </div>

            <div class="input-group">
                <label for="input-bet">决定下注量 (￥):</label>
                <input type="number" id="input-bet" value="200" min="0">
            </div>

            <div class="btn-grid">
                <button class="btn-win" onclick="handleResult(true)">👍 选自己赢（按输入赔率结算）</button>
                <button class="btn-lose" onclick="handleResult(false)">👎 选自己输（亏损该下注）</button>
                <button class="btn-reset" onclick="resetAll()">🔄 重置所有数据</button>
            </div>
        </div>

        <div class="panel panel-right">
            <div class="history-title">📜 每次下注实时明细</div>
            <div class="history-container">
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>预估(胜率/赔率)</th>
                            <th>下注金额</th>
                            <th>结果</th>
                            <th>最新总资金</th>
                        </tr>
                    </thead>
                    <tbody id="history-log">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 从 localStorage 读取历史数据，如果没有则初始化默认值
    let totalMoney = parseFloat(localStorage.getItem('kelly_v2_totalMoney')) || 1000;
    let betCount = parseInt(localStorage.getItem('kelly_v2_betCount')) || 0;
    let winCount = parseInt(localStorage.getItem('kelly_v2_winCount')) || 0;
    let historyData = JSON.parse(localStorage.getItem('kelly_v2_historyData')) || [];

    const inputMoney = document.getElementById('input-money');
    const inputProb = document.getElementById('input-prob');
    const inputOdds = document.getElementById('input-odds');
    const inputBet = document.getElementById('input-bet');
    
    const displayMoney = document.getElementById('display-money');
    const displayCount = document.getElementById('display-count');
    const displayWinRate = document.getElementById('display-win-rate');
    const kellyHint = document.getElementById('kelly-hint');
    const historyLog = document.getElementById('history-log');

    // 只有在没开始下注时，允许直接同步总资金
    inputMoney.addEventListener('input', function() {
        if(betCount === 0) {
            totalMoney = parseFloat(inputMoney.value) || 0;
            saveToStorage();
            updateDashboard();
            calculateKelly();
        }
    });

    // 监听胜率和赔率的实时变化，自动重算凯利建议
    inputProb.addEventListener('input', () => { calculateKelly(); });
    inputOdds.addEventListener('input', () => { calculateKelly(); });

    // 核心凯利公式计算：f = (b * p - q) / b
    function calculateKelly() {
        const p = (parseFloat(inputProb.value) || 0) / 100;
        const b = parseFloat(inputOdds.value) || 0;
        const q = 1 - p;
        
        let kellyFraction = 0;
        if (b > 0) {
            kellyFraction = (b * p - q) / b;
        }
        
        if (kellyFraction < 0) kellyFraction = 0;

        const recommendedBet = totalMoney * kellyFraction;
        kellyHint.innerText = `凯利建议下注比例: ${(kellyFraction * 100).toFixed(2)}% (￥${recommendedBet.toFixed(2)})`;
        
        if(recommendedBet >= 0) {
            inputBet.value = Math.round(recommendedBet);
        }
    }

    // 将数据存入浏览器本地存储
    function saveToStorage() {
        localStorage.setItem('kelly_v2_totalMoney', totalMoney);
        localStorage.setItem('kelly_v2_betCount', betCount);
        localStorage.setItem('kelly_v2_winCount', winCount);
        localStorage.setItem('kelly_v2_historyData', JSON.stringify(historyData));
    }

    function updateDashboard() {
        displayMoney.innerText = `￥${totalMoney.toFixed(2)}`;
        displayCount.innerText = `${betCount} 次`;
        const realTimeWinRate = betCount > 0 ? (winCount / betCount * 100).toFixed(1) : '0.0';
        displayWinRate.innerText = `${realTimeWinRate}%`;
    }

    // 渲染历史记录表格
    function renderHistory() {
        historyLog.innerHTML = "";
        for (let i = historyData.length - 1; i >= 0; i--) {
            const item = historyData[i];
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.id}</td>
                <td>${item.prob}% / ${item.odds}倍</td>
                <td>￥${item.bet}</td>
                <td class="${item.cls}">${item.txt}</td>
                <td>￥${item.currentTotal.toFixed(2)}</td>
            `;
            historyLog.appendChild(row);
        }
    }

    function handleResult(isWin) {
        const currentBet = parseFloat(inputBet.value) || 0;
        const currentProb = parseFloat(inputProb.value) || 0;
        const currentOdds = parseFloat(inputOdds.value) || 0;

        if (currentBet <= 0) { alert("下注量必须大于 0！"); return; }
        if (currentBet > totalMoney) { alert("资金不足！"); return; }
        if (currentOdds <= 0) { alert("净赔率必须大于 0！"); return; }

        betCount++;
        let resultText = "";
        let resultClass = "";

        if (isWin) {
            winCount++;
            const profit = currentBet * currentOdds; // 根据输入的赔率计算净利润
            totalMoney += profit;
            resultText = "赢 (+" + profit.toFixed(1) + ")";
            resultClass = "text-win";
        } else {
            totalMoney -= currentBet; // 输了同样扣除本金
            resultText = "输 (-" + currentBet + ")";
            resultClass = "text-lose";
        }

        inputMoney.value = Math.round(totalMoney);

        // 将本条记录加入数组
        historyData.push({
            id: betCount,
            prob: currentProb,
            odds: currentOdds,
            bet: currentBet,
            txt: resultText,
            cls: resultClass,
            currentTotal: totalMoney
        });

        // 存盘并更新界面
        saveToStorage();
        renderHistory();
        updateDashboard();
        calculateKelly();
    }

    function resetAll() {
        localStorage.clear();

        totalMoney = 1000;
        betCount = 0;
        winCount = 0;
        historyData = [];
        
        inputMoney.value = 1000;
        inputProb.value = 60;
        inputOdds.value = 1;
        inputBet.value = 200;
        
        renderHistory();
        updateDashboard();
        calculateKelly();
    }

    // 初始化运行：恢复历史状态
    inputMoney.value = Math.round(totalMoney);
    renderHistory();
    updateDashboard();
    calculateKelly();
</script>
</body>
</html>
